serde-utils                     = { workspace = true }
serde_json                      = { workspace = true }
tokio                           = { workspace = true }
tracing                         = { workspace = true }
unionlabs                       = { workspace = true }
voyager-event-source-plugin-gno = { workspace = true }
voyager-sdk                     = { workspace = true }
