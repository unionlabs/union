[package]
name    = "gno-rpc"
version = "0.0.0"

authors      = { workspace = true }
edition      = { workspace = true }
license-file = { workspace = true }
publish      = { workspace = true }
repository   = { workspace = true }

[package.metadata.crane]
# test-include = ["lib/cometbft-rpc/testdata"]

[lints]
workspace = true

[dependencies]
base64                         = { workspace = true }
gno-types                      = { workspace = true }
hex                            = { workspace = true }
jsonrpsee                      = { workspace = true, features = ["tracing", "ws-client", "http-client"] }
macros                         = { workspace = true }
protos                         = { workspace = true, features = ["ibc+core+commitment+v1"] }
reconnecting-jsonrpc-ws-client = { workspace = true }
serde                          = { workspace = true, features = ["derive"] }
serde-utils                    = { workspace = true }
serde_json                     = { workspace = true }
thiserror                      = { workspace = true }
tracing                        = { workspace = true }
unionlabs                      = { workspace = true }

[dev-dependencies]
hex-literal         = "1.1.0"
serde_json          = "1.0.140"
serde_path_to_error = "0.1.17"
tokio               = { workspace = true, features = ["macros"] }
