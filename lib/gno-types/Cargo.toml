[package]
name    = "gno-types"
version = "0.0.0"

authors      = { workspace = true }
edition      = { workspace = true }
license-file = { workspace = true }
publish      = { workspace = true }
repository   = { workspace = true }

[lints]
workspace = true

[dependencies]
bincode     = { workspace = true, features = ["alloc", "derive"], optional = true }
prost       = { workspace = true }                                                  # TODO: Feature gate proto?
protos      = { workspace = true, features = ["google+protobuf"] }
serde       = { workspace = true }
serde-utils = { workspace = true }
sha2        = { workspace = true }                                                  # NOTE: Feature gate this if/when proto is feature gated
thiserror   = { workspace = true }
unionlabs   = { workspace = true }

[dev-dependencies]
gno-types   = { workspace = true, default-features = true }   # enable all features for tests
hex-literal = { workspace = true }
serde_json  = { workspace = true }
unionlabs   = { workspace = true, features = ["test-utils"] }

[features]
bincode = ["dep:bincode", "unionlabs/bincode"]
# default = ["proto", "hash"]
# hash    = ["dep:sha2", "dep:prost"]
# proto   = ["unionlabs/proto"]
