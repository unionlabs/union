[package]
name    = "lst-ocw"
version = "0.0.0"

authors      = { workspace = true }
edition      = { workspace = true }
license-file = { workspace = true }
publish      = { workspace = true }
repository   = { workspace = true }

[lints]
workspace = true

[dependencies]
anyhow             = { workspace = true, features = ["std"] }
bip32              = { workspace = true }
clap               = { workspace = true, features = ["derive", "error-context", "help", "env"] }
cometbft-rpc       = { workspace = true }
cosmos-client      = { workspace = true }
embed-commit       = { workspace = true }
futures            = { workspace = true }
lst                = { workspace = true, features = ["library"] }
protos             = { workspace = true }
serde              = { workspace = true, features = ["derive"] }
serde_json         = { workspace = true }
tokio              = { workspace = true, features = ["full"] }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt", "ansi", "json"] }
unionlabs          = { workspace = true, features = ["proto"] }
