[package]
authors      = ["Hussein Ait Lahcen <hussein.aitlahcen@gmail.com>"]
edition      = { workspace = true }
license-file = { workspace = true }
name         = "ibc-union-msg"
repository   = "https://github.com/unionlabs/union"
version      = "1.0.0"

[lints]
workspace = true

[features]
cw-orch-interface = [
    "dep:cw-orch",
    "dep:schemars",
    "dep:cosmwasm-std",
    "dep:cosmwasm-schema",
    "unionlabs-primitives/schemars",
    "ibc-solidity/schemars",
]
schemars = []

[dependencies]
ibc-solidity         = { workspace = true, features = ["serde"] }
serde                = { workspace = true, features = ["derive"] }
unionlabs-primitives = { workspace = true, features = ["serde"] }


cosmwasm-schema = { workspace = true, optional = true }
cosmwasm-std    = { workspace = true, optional = true }
cw-orch         = { workspace = true, optional = true }
schemars        = { workspace = true, optional = true }
