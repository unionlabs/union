[package]
name    = "gno-light-client"
version = "0.0.0"

authors      = { workspace = true }
edition      = { workspace = true }
license-file = { workspace = true }
publish      = { workspace = true }
repository   = { workspace = true }

[lints]
workspace = true

[package.metadata.crane]
# test-include = ["cosmwasm/lightclient/gno/src/test"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
cosmwasm-std           = { workspace = true }
embed-commit           = { workspace = true }
frissitheto            = { workspace = true }
gno-light-client-types = { workspace = true, features = ["ethabi", "bincode"] }
gno-types              = { workspace = true }
gno-verifier           = { workspace = true }
ibc-union-light-client = { workspace = true }
ibc-union-spec         = { workspace = true }
ics23                  = { workspace = true }
sha2                   = { workspace = true }
thiserror              = { workspace = true }
unionlabs              = { workspace = true, features = ["cosmwasm"] }

[dev-dependencies]
base64      = { workspace = true }
hex-literal.workspace = true
lazy_static = "1.5.0"
serde_json  = { workspace = true }


[features]
library = []
